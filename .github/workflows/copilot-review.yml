name: Request Copilot Review

on:
  pull_request:
    types: [opened, reopened]

permissions:
  pull-requests: write

jobs:
  copilot-review:
    runs-on: ubuntu-latest
    name: Request Copilot Review

    steps:
      - name: Request Copilot review
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            --method POST \
            repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/requested_reviewers \
            -f reviewers='["@copilot"]' 2>/dev/null || echo "Note: Copilot review request may require additional setup"
