name: Sourcery Gate

on:
  pull_request:
    types: [synchronize]
  pull_request_review:
    types: [submitted]

# Coalesce bursts of rapid pushes so we only request one Sourcery re-review
# per burst instead of one per push, easing Sourcery's rolling-window rate
# limit. Keyed by event name so the review-trigger runs (pull_request) and the
# status-posting runs (pull_request_review) never cancel each other.
concurrency:
  group: sourcery-gate-${{ github.event_name }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  statuses: write
  pull-requests: write

jobs:
  sourcery-gate:
    runs-on: ubuntu-latest
    name: Mark Sourcery review received
    steps:
      - name: Request Sourcery re-review on new commits
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: '@sourcery-ai review'
            })

      - name: Post sourcery-reviewed status
        if: github.event_name == 'pull_request_review' && contains(github.event.review.user.login, 'sourcery-ai')
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: 'success',
              context: 'sourcery-reviewed',
              description: 'Sourcery has reviewed this PR'
            })
